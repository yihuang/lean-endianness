name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan (Lean version manager)
        uses: leanprover/lean4-install-action@v1

      - name: Build project
        run: lake build

      - name: Run examples (computation check)
        run: lake build Endianness
